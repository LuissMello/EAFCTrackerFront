<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0B1220" />
  <title>EAFC Tracker</title>

  <!-- Resolve theme before first paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var dark = stored === "dark" || ((!stored || stored === "system") && prefersDark);
        var root = document.documentElement;
        if (dark) root.classList.add("dark");
        root.style.colorScheme = dark ? "dark" : "light";
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Saira+Condensed:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="root"></div>
</body>
</html>
