name: Deploy to GitHub Pages # Nome que aparece na aba 'Actions' do GitHub

on:
  push:
    branches:
      - main # <--- IMPORTANTE: Mude para a branch que vocï¿½ usa para fazer o 'git push' (ex: master, main, develop)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # O sistema operacional onde o build vai acontecer (ambiente Linux)

    steps:
      - name: Checkout repository # Pega o seu cï¿½digo do GitHub
        uses: actions/checkout@v4

      - name: Set up Node.js # Configura o ambiente Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # <--- IMPORTANTE: Use a versï¿½o do Node.js que seu projeto usa (ex: '18', '16').

      - name: Install dependencies # Instala as dependï¿½ncias do seu projeto (node_modules)
        run: npm ci # 'npm ci' ï¿½ mais rï¿½pido e confiï¿½vel em CI/CD que 'npm install'

      - name: Build project # <--- ESTE ï¿½ O PASSO CRï¿½TICO PARA A URL DA API!
        run: npm run build # Seu comando de build do React (geralmente 'react-scripts build')
        env:
          # <--- INJETA A URL DA SUA API COMO UMA VARIï¿½VEL DE AMBIENTE DURANTE O BUILD
          # Isso garante que a URL esteja correta no cï¿½digo final que vai para o GitHub Pages.
          REACT_APP_API_BASE_URL: https://eafctracker.fly.dev

      - name: Deploy to GitHub Pages # Faz o deploy dos arquivos gerados para o GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # Action de terceiros para deploy no GH Pages
        # <--- IMPORTANTE: Esta condiï¿½ï¿½o garante que o deploy sï¿½ ocorra na sua branch principal.
        if: ${{ github.ref == 'refs/heads/main' }} # Mude 'main' para a sua branch se for diferente
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Token padrï¿½o do GitHub para autenticaï¿½ï¿½o
          publish_dir: ./build # <--- IMPORTANTE: Esta ï¿½ a pasta que o 'npm run build' gera com seu app compilado
          # force_orphan: true # Opcional: Descomente para forï¿½ar um deploy limpo, apagando histï¿½rico anterior.
                               # Use com cautela! Geralmente nï¿½o ï¿½ necessï¿½rio para a maioria dos casos.
